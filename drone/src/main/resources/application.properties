spring.application.name=drone

# URL de la base de datos (reemplaza 'nombre_tu_db' por el nombre real)
spring.datasource.url=jdbc:mysql://localhost:3306/nombre_tu_db?serverTimezone=UTC

# Credenciales de acceso
spring.datasource.username=root
spring.datasource.password=tu_contraseÒa

# Driver y Dialecto
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Estrategia de actualizaciÛn de tablas (update crea las tablas si no existen)
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola (opcional, muy ˙til para debug)
spring.jpa.show-sql=true